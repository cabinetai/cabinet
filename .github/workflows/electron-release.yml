name: Electron Release (manual)

# Triggered manually. Two modes:
#  * RELEASE  — dispatch with a `tag` (e.g. v0.4.0): macOS job signs/notarizes/
#    publishes; Windows job builds and attaches artifacts to that release.
#  * VALIDATE — dispatch with NO tag (against a branch): macOS and Windows build
#    the current branch, smoke-test their packaged output, and upload artifacts
#    without writing to a release.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g., v0.4.0). Leave empty to validate the selected branch without publishing.'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  electron-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer certificate
        if: ${{ inputs.tag != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build standalone app and daemon
        run: npm run build && npm run electron:prep

      - name: Smoke-test standalone app and daemon
        run: npm run test:bundle

      - name: Build unsigned validation DMG and ZIP
        if: ${{ inputs.tag == '' }}
        run: npx electron-forge make

      - name: Build, sign, and notarize release DMG and ZIP
        if: ${{ inputs.tag != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: npx electron-forge publish --dry-run

      - name: Smoke-test packaged macOS application
        env:
          CABINET_ELECTRON_SMOKE_LOG_DIR: ${{ runner.temp }}/cabinet-electron-smoke-logs
        run: npm run test:electron:macos

      - name: Verify release signing and notarization
        if: ${{ inputs.tag != '' }}
        run: |
          APP_PATH="$(find out -type d -name Cabinet.app -print -quit)"
          test -n "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl --assess --type execute --verbose=4 "$APP_PATH"

      - name: Publish validated release artifacts
        if: ${{ inputs.tag != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-forge publish --from-dry-run

      - name: Upload macOS build artifacts and smoke-test logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: cabinet-macos-${{ inputs.tag || github.sha }}
          path: |
            out/make/**
            ${{ runner.temp }}/cabinet-electron-smoke-logs/**
          if-no-files-found: warn

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true

  electron-windows:
    runs-on: windows-latest
    steps:
      # With a tag -> build that release; without -> build the dispatched branch.
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # Produces the portable ZIP (MakerZIP win32) and the Squirrel .exe
      # installer (+ .nupkg + RELEASES) under out/make/. Failing here blocks
      # the Windows release before any artifact is published.
      - name: Build Windows Electron app (ZIP + Squirrel installer)
        run: npm run electron:make:win

      # Always keep the build for download/smoke-testing, even if the upload
      # step below is skipped (e.g. the release doesn't exist yet).
      - name: Upload Windows build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cabinet-windows-${{ inputs.tag || github.sha }}
          path: out/make/**
          if-no-files-found: warn

      # Release-only: only attach to a GitHub release when a tag was given.
      - name: Attach Windows artifacts to the GitHub release
        if: ${{ inputs.tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ inputs.tag }}" \
            out/make/zip/win32/x64/* \
            out/make/squirrel.windows/x64/* \
            --clobber
